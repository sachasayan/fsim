<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSIM | 2D World Designer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.7);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --accent-strong: #7dd3fc;
            --accent-soft: rgba(56, 189, 248, 0.14);
            --text: #f9fafb;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
            --success: #10b981;
            --danger: #ef4444;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #editor-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            cursor: default;
            background: radial-gradient(circle at center, #111827 0%, #030712 100%);
        }

        #canvas-container.tool-select {
            cursor: default;
        }

        #canvas-container.tool-pan {
            cursor: grab;
        }

        #canvas-container.tool-pan.dragging {
            cursor: grabbing;
        }

        #canvas-container.tool-edit-poly {
            cursor: cell;
        }

        #canvas-container.tool-add-city,
        #canvas-container.tool-add-district {
            cursor: copy;
        }

        #canvas-container.tool-terrain-raise,
        #canvas-container.tool-terrain-lower,
        #canvas-container.tool-terrain-flatten {
            cursor: crosshair;
        }

        canvas {
            display: block;
        }

        #sidebar {
            width: 340px;
            background: var(--panel);
            backdrop-filter: blur(24px) saturate(180%);
            border-left: 1px solid var(--border);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            z-index: 10;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .toolbar {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            background: var(--panel);
            padding: 6px;
            border-radius: 16px;
            backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: min(88vw, 560px);
        }

        .tool-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            padding: 8px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 10px;
            letter-spacing: 0.06em;
        }

        .tool-btn:hover {
            background: var(--glass);
            color: var(--text);
            border-color: var(--border);
        }

        .tool-btn.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .tool-btn.tool-icon {
            min-width: 58px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            line-height: 1;
        }

        .tool-btn.tool-icon svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tool-btn.tool-icon .tool-label {
            font-size: 9px;
            text-transform: uppercase;
        }

        h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.025em;
            display: flex;
            align-items: center;
        }

        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 0.1em;
            font-weight: 700;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .property-panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #layers-panel {
            max-height: 32vh;
            overflow-y: auto;
        }

        .layers-group {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(5, 10, 20, 0.35);
        }

        .layers-group-header {
            width: 100%;
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            padding: 9px 10px;
            font-size: 11px;
        }

        .layers-group-header .chevron {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-strong);
            opacity: 0.8;
        }

        .layer-count {
            color: var(--text-dim);
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
        }

        .layer-toggle {
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.35);
            color: var(--text-dim);
            width: 24px;
            height: 24px;
            border-radius: 7px;
            font-size: 12px;
            cursor: pointer;
        }

        .layer-toggle:hover {
            color: var(--text);
            border-color: rgba(125, 211, 252, 0.35);
        }

        .layers-items {
            display: flex;
            flex-direction: column;
        }

        .layer-item {
            display: grid;
            grid-template-columns: auto auto minmax(0, 1fr);
            align-items: center;
            gap: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 10px;
        }

        .layer-item:hover,
        .layer-item.selected {
            background: rgba(56, 189, 248, 0.1);
        }

        .layer-group-name,
        .layer-item-select {
            border: 0;
            background: transparent;
            color: var(--text);
            font-size: 11px;
            text-align: left;
            cursor: pointer;
        }

        .layer-item-name {
            font-size: 11px;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-dim);
        }

        .layer-item.selected .layer-item-name,
        .layer-item-select:hover .layer-item-name {
            color: var(--text);
        }

        .property-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .property-row {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
        }

        .hint-card {
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.16);
            background: rgba(56, 189, 248, 0.08);
            color: var(--text-dim);
            font-size: 12px;
            line-height: 1.45;
            padding: 12px 14px;
        }

        label {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 400;
        }

        .field-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .control-stack {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
        }

        .control-cluster {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        input[type="number"],
        input[type="text"],
        select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            width: 80px;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"],
        input[type="text"] {
            width: 96px;
        }

        input[type="text"][readonly] {
            width: 100%;
            color: var(--accent-strong);
            background: rgba(7, 11, 24, 0.85);
        }

        select {
            width: 100%;
            min-width: 170px;
            appearance: none;
            padding-right: 34px;
            background-image:
                linear-gradient(45deg, transparent 50%, var(--accent-strong) 50%),
                linear-gradient(135deg, var(--accent-strong) 50%, transparent 50%),
                linear-gradient(to right, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.08));
            background-position:
                calc(100% - 18px) calc(50% - 3px),
                calc(100% - 12px) calc(50% - 3px),
                calc(100% - 38px) 50%;
            background-size: 6px 6px, 6px 6px, 1px 60%;
            background-repeat: no-repeat;
        }

        input[type="range"] {
            width: 100%;
            height: 18px;
            margin: 0;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 6px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(56, 189, 248, 0.85), rgba(125, 211, 252, 0.4));
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-top: -5px;
            border: 2px solid #08111f;
            background: #f8fbff;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.18);
        }

        input[type="range"]::-moz-range-track {
            height: 6px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(56, 189, 248, 0.85), rgba(125, 211, 252, 0.4));
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border: 2px solid #08111f;
            border-radius: 50%;
            background: #f8fbff;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.18);
        }

        input:focus {
            border-color: var(--accent);
        }

        select:focus {
            border-color: var(--accent);
        }

        .value-pill {
            min-width: 48px;
            text-align: center;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            background: var(--accent-soft);
            color: var(--accent-strong);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            font-family: 'JetBrains Mono', monospace;
        }

        .save-btn {
            margin-top: auto;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        #coords {
            position: absolute;
            bottom: 24px;
            left: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            letter-spacing: 0.05em;
        }

        .status-badge {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            margin-left: 10px;
            font-weight: 700;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        #selection-panel {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 1080px) {
            #sidebar {
                width: 320px;
                padding: 20px 16px;
            }

            .toolbar {
                max-width: min(92vw, 480px);
            }
        }
    </style>
</head>

<body>
    <div id="editor-container">
        <div id="canvas-container">
            <canvas id="map-canvas"></canvas>
            <div class="toolbar">
                <button class="tool-btn tool-icon active" id="tool-select" aria-label="Select (V)" title="Select (V)">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3v18l5-6 4 6 5-2-4-6 6-4z"></path></svg>
                    <span class="tool-label">Select</span>
                </button>
                <button class="tool-btn tool-icon" id="tool-add-city" aria-label="Add City (C)" title="Add City (C)">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V9l4 2V7l4 2V5l4 2v13z"></path><path d="M14 14h6"></path><path d="M17 11v6"></path></svg>
                    <span class="tool-label">City</span>
                </button>
                <button class="tool-btn tool-icon" id="tool-add-district" aria-label="Add District (D)" title="Add District (D)">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v12H4z"></path><path d="M12 10v4"></path><path d="M10 12h4"></path></svg>
                    <span class="tool-label">District</span>
                </button>
                <button class="tool-btn tool-icon" id="tool-edit-poly" aria-label="Edit Polygon (E)" title="Edit Polygon (E)">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6l7-3 7 4v9l-7 5-7-4z"></path><circle cx="5" cy="6" r="1.7"></circle><circle cx="12" cy="3" r="1.7"></circle><circle cx="19" cy="7" r="1.7"></circle></svg>
                    <span class="tool-label">Edit</span>
                </button>
                <button class="tool-btn tool-icon" id="tool-terrain-raise" aria-label="Terrain Raise (R)" title="Terrain Raise (R)">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 18h16"></path><path d="M12 6v8"></path><path d="M9 9l3-3 3 3"></path></svg>
                    <span class="tool-label">Raise</span>
                </button>
                <button class="tool-btn tool-icon" id="tool-terrain-lower" aria-label="Terrain Lower (L)" title="Terrain Lower (L)">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 18h16"></path><path d="M12 6v8"></path><path d="M9 11l3 3 3-3"></path></svg>
                    <span class="tool-label">Lower</span>
                </button>
                <button class="tool-btn tool-icon" id="tool-terrain-flatten" aria-label="Terrain Flatten (F)" title="Terrain Flatten (F)">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 16h16"></path><path d="M4 11h16"></path><path d="M4 8h16"></path></svg>
                    <span class="tool-label">Flatten</span>
                </button>
                <button class="tool-btn tool-icon" id="tool-pan" aria-label="Pan (H)" title="Pan (H)">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v18"></path><path d="M3 12h18"></path><path d="M8 7l4-4 4 4"></path><path d="M8 17l4 4 4-4"></path><path d="M7 8L3 12l4 4"></path><path d="M17 8l4 4-4 4"></path></svg>
                    <span class="tool-label">Pan</span>
                </button>
            </div>
            <div id="coords">X: 0, Z: 0</div>
        </div>
        <div id="sidebar">
            <h2>WORLD EDITOR <span class="status-badge">v1.0</span></h2>

            <div class="property-panel" id="layers-panel">
                <div class="section-title">Layers</div>
                <div id="layers-groups"></div>
            </div>

            <div id="selection-panel" style="display: none;">
                <div class="section-title">Selection Properties <span id="prop-type-badge"
                        class="status-badge">CITY</span></div>
                <div class="property-group">
                    <div class="property-row">
                        <div class="field-label">
                            <label>ID</label>
                        </div>
                        <input type="text" id="prop-id" readonly>
                    </div>
                    <div class="property-row">
                        <div class="field-label">
                            <label>Coord X</label>
                        </div>
                        <input type="number" id="prop-cx">
                    </div>
                    <div class="property-row">
                        <div class="field-label">
                            <label>Coord Z</label>
                        </div>
                        <input type="number" id="prop-cz">
                    </div>

                    <div id="district-only-props" style="display: none;">
                        <div class="property-row">
                            <div class="field-label">
                                <label>District Type</label>
                            </div>
                            <div class="control-cluster">
                                <select id="prop-district-type">
                                    <option value="financial_core">financial_core</option>
                                    <option value="commercial">commercial</option>
                                    <option value="residential">residential</option>
                                    <option value="industrial">industrial</option>
                                    <option value="suburban">suburban</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div id="terrain-only-props" style="display: none;">
                        <div class="property-row">
                            <div class="field-label">
                                <label>Brush Kind</label>
                            </div>
                            <input type="text" id="prop-terrain-kind" readonly>
                        </div>
                        <div class="property-row">
                            <div class="field-label">
                                <label>Radius</label>
                                <span class="value-pill" id="prop-terrain-radius-value">300</span>
                            </div>
                            <div class="control-stack">
                                <input type="range" id="prop-terrain-radius-range" min="50" max="2000" step="10">
                                <input type="number" id="prop-terrain-radius" min="50" max="2000" step="10">
                            </div>
                        </div>
                        <div class="property-row" id="terrain-delta-row">
                            <div class="field-label">
                                <label>Delta</label>
                                <span class="value-pill" id="prop-terrain-delta-value">40</span>
                            </div>
                            <div class="control-stack">
                                <input type="range" id="prop-terrain-delta-range" min="1" max="200" step="1">
                                <input type="number" id="prop-terrain-delta" min="1" max="200" step="1">
                            </div>
                        </div>
                        <div class="property-row" id="terrain-target-row" style="display: none;">
                            <div class="field-label">
                                <label>Target H</label>
                                <span class="value-pill" id="prop-terrain-target-value">0</span>
                            </div>
                            <div class="control-stack">
                                <input type="range" id="prop-terrain-target-range" min="-200" max="1200" step="5">
                                <input type="number" id="prop-terrain-target" min="-200" max="1200" step="5">
                            </div>
                        </div>
                        <div class="property-row" id="terrain-opacity-row" style="display: none;">
                            <div class="field-label">
                                <label>Opacity</label>
                                <span class="value-pill" id="prop-terrain-opacity-value">1</span>
                            </div>
                            <div class="control-stack">
                                <input type="range" id="prop-terrain-opacity-range" step="0.05" min="0" max="1">
                                <input type="number" id="prop-terrain-opacity" step="0.05" min="0" max="1">
                            </div>
                        </div>
                        <div class="property-row">
                            <div class="field-label">
                                <label>Stroke Points</label>
                            </div>
                            <input type="text" id="prop-terrain-points" readonly>
                        </div>
                        <div class="hint-card" id="terrain-edit-hint">
                            Use <strong>Edit Poly</strong> to drag stroke points, double-click the stroke to add one, and right-click a point to remove it.
                        </div>
                    </div>

                    <div id="vantage-only-props" style="display: none;">
                        <div class="property-row">
                            <div class="field-label">
                                <label>Altitude (m)</label>
                                <span class="value-pill" id="prop-alt-value">0</span>
                            </div>
                            <div class="control-stack">
                                <input type="range" id="prop-alt-range" min="0" max="3000" step="10">
                                <input type="number" id="prop-alt" min="0" max="3000" step="10">
                            </div>
                        </div>
                        <div class="property-row">
                            <div class="field-label">
                                <label>Tilt (°)</label>
                                <span class="value-pill" id="prop-tilt-value">45</span>
                            </div>
                            <div class="control-stack">
                                <input type="range" id="prop-tilt-range" min="5" max="85" step="1">
                                <input type="number" id="prop-tilt" min="5" max="85" step="1">
                            </div>
                        </div>
                        <button class="tool-btn" id="jump-sim-btn"
                            style="margin-top: 10px; background: #9eff66; color: #000; width: 100%;">LAUNCH IN
                            SIM</button>
                    </div>

                    <div class="property-group" style="margin-top: 15px;">
                        <button class="tool-btn" id="tool-delete"
                            style="background: rgba(255, 89, 94, 0.2); color: #ff595e; border-color: rgba(255,89,94,0.3); width: 100%;">Delete
                            Selected</button>
                    </div>
                </div>
            </div>

            <div id="no-selection">
                <p style="color: #8892b0; font-size: 13px; text-align: center; margin-top: 40px;">
                    Select an object to edit its properties.
                </p>
            </div>

            <div class="property-panel">
                <div class="section-title">Terrain Brush</div>
                <div class="property-group">
                    <div class="property-row">
                        <div class="field-label">
                            <label>Radius</label>
                            <span class="value-pill" id="terrain-brush-radius-value">300</span>
                        </div>
                        <div class="control-stack">
                            <input type="range" id="terrain-brush-radius-range" value="300" min="50" max="2000" step="10">
                            <input type="number" id="terrain-brush-radius" value="300" min="50" max="2000" step="10">
                        </div>
                    </div>
                    <div class="property-row">
                        <div class="field-label">
                            <label>Strength</label>
                            <span class="value-pill" id="terrain-brush-strength-value">40</span>
                        </div>
                        <div class="control-stack">
                            <input type="range" id="terrain-brush-strength-range" value="40" min="0" max="200" step="1">
                            <input type="number" id="terrain-brush-strength" value="40" step="1" min="0" max="200">
                        </div>
                    </div>
                </div>
            </div>

            <button class="save-btn" id="save-btn">SAVE CHANGES</button>
        </div>

        <script type="importmap">
