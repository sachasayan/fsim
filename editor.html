<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSIM | 2D World Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.76);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --accent-strong: #7dd3fc;
            --accent-soft: rgba(56, 189, 248, 0.14);
            --text: #f9fafb;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at top, #111827 0%, #030712 62%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #editor-app,
        #editor-container {
            width: 100%;
            height: 100%;
        }

        #editor-container {
            display: flex;
        }

        #canvas-container {
            position: relative;
            flex: 1;
            background: radial-gradient(circle at center, #111827 0%, #030712 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #sidebar {
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 24px 20px;
            overflow-y: auto;
            background: var(--panel);
            backdrop-filter: blur(24px) saturate(180%);
            border-left: 1px solid var(--border);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.45);
        }

        .toolbar {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding: 6px;
            max-width: min(88vw, 640px);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(20px) saturate(150%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        }

        .tool-btn {
            border: 1px solid transparent;
            border-radius: 12px;
            background: transparent;
            color: var(--text-dim);
            padding: 8px 10px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
            transition: 160ms ease;
        }

        .tool-btn:hover {
            background: var(--glass);
            color: var(--text);
            border-color: var(--border);
        }

        .tool-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .tool-btn.active,
        .save-btn {
            background: var(--accent);
            color: #04131d;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .tool-btn.tool-icon {
            min-width: 62px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tool-btn.tool-icon svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tool-label {
            font-size: 9px;
            text-transform: uppercase;
        }

        h2 {
            margin: 0;
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 0.1em;
            font-weight: 700;
            margin-bottom: 4px;
            opacity: 0.85;
        }

        .property-panel {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--glass);
        }

        .muted-panel {
            min-height: 120px;
            justify-content: center;
        }

        .empty-copy {
            margin: 0;
            color: var(--text-dim);
            font-size: 13px;
            text-align: center;
        }

        .property-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .inline-actions {
            flex-direction: row;
            flex-wrap: wrap;
        }

        .property-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .control-stack {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
        }

        label {
            font-size: 13px;
            color: var(--text-dim);
        }

        input[type="number"],
        input[type="text"],
        input[type="search"],
        select {
            width: 100%;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.38);
            color: var(--text);
            padding: 8px 12px;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
        }

        input[type="range"] {
            width: 100%;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 6px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(56, 189, 248, 0.85), rgba(125, 211, 252, 0.4));
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            margin-top: -5px;
            border-radius: 50%;
            border: 2px solid #08111f;
            background: #f8fbff;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.18);
        }

        .value-pill,
        .status-chip {
            min-width: 48px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            background: var(--accent-soft);
            color: var(--accent-strong);
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
        }

        .status-chip.dirty {
            border-color: rgba(245, 158, 11, 0.35);
            color: #fcd34d;
            background: rgba(245, 158, 11, 0.12);
        }

        .status-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-badge {
            margin-left: 10px;
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            font-weight: 700;
        }

        .hint-card {
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.16);
            background: rgba(56, 189, 248, 0.08);
            color: var(--text-dim);
            font-size: 12px;
            line-height: 1.45;
            padding: 12px 14px;
        }

        .error-card {
            border-color: rgba(239, 68, 68, 0.28);
            background: rgba(239, 68, 68, 0.12);
            color: #fecaca;
        }

        .help-card p {
            margin: 0 0 8px;
        }

        .help-card p:last-child {
            margin-bottom: 0;
        }

        #coords {
            position: absolute;
            bottom: 24px;
            left: 24px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--panel);
            backdrop-filter: blur(10px);
            color: var(--text-dim);
            padding: 6px 14px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
        }

        .layers-group {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: rgba(5, 10, 20, 0.35);
        }

        .layers-group-header {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 8px;
            padding: 9px 10px;
            background: rgba(255, 255, 255, 0.03);
        }

        .layer-controls {
            display: flex;
            gap: 6px;
        }

        .layer-toggle,
        .layer-group-name,
        .layer-item-select {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.25);
            color: var(--text-dim);
            cursor: pointer;
            font-size: 11px;
            padding: 6px 8px;
        }

        .layer-group-name,
        .layer-item-select {
            text-align: left;
            border: 0;
            background: transparent;
            color: var(--text);
            padding: 0;
        }

        .layer-count {
            color: var(--text-dim);
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
        }

        .layers-items {
            display: flex;
            flex-direction: column;
        }

        .layer-item {
            display: grid;
            grid-template-columns: auto auto minmax(0, 1fr);
            gap: 6px;
            align-items: center;
            padding: 8px 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .layer-item.selected,
        .layer-item:hover {
            background: rgba(56, 189, 248, 0.1);
        }

        .layer-item-name {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 11px;
            color: var(--text-dim);
        }

        .footer-panel {
            margin-top: auto;
        }

        .secondary-action {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border-color: var(--border);
        }

        .danger-action {
            background: rgba(255, 89, 94, 0.16);
            color: #fecaca;
            border-color: rgba(255, 89, 94, 0.3);
        }

        .accent-action {
            background: #9eff66;
            color: #04131d;
        }

        .save-btn {
            border: 0;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .toast {
            position: fixed;
            right: 24px;
            bottom: 24px;
            max-width: 320px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.24);
            background: rgba(10, 18, 28, 0.92);
            color: var(--text);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .toast-success {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .toast-error {
            border-color: rgba(239, 68, 68, 0.32);
        }

        @media (max-width: 1080px) {
            #sidebar {
                width: 320px;
                padding: 18px 16px;
            }

            .toolbar {
                max-width: min(92vw, 520px);
            }
        }
    </style>
</head>

<body>
    <div id="editor-app"></div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="./js/editor.js"></script>
</body>

</html>
