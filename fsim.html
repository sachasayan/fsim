<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper-Realistic Airline Simulator</title>
    <link rel="stylesheet" href="./styles/app.css">
    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@dimforge/rapier3d-compat": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.14.0/rapier.es.js",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.20/+esm"
            }
        }
    </script>
</head>

<body>

    <div id="loader" role="status" aria-live="polite">
        <div class="spinner"></div>
        <h2 id="loader-text">INITIALIZING FLIGHT DYNAMICS</h2>
        <p id="loader-subtext">Generating Procedural World...</p>
    </div>

    <div id="game-container"></div>
    <div id="warning-overlay" role="alert" aria-live="assertive">STALL</div>

    <!-- NEW CRASH SCREEN OVERLAY -->
    <div id="crash-screen" role="alert" aria-live="assertive">
        <h1 class="crash-title">AIRCRAFT DESTROYED
        </h1>
        <p id="crash-reason" class="crash-reason"></p>
        <button onclick="resetFlight()" class="crash-reset-btn" aria-label="Restart flight">RESTART
            FLIGHT</button>
    </div>

    <!-- NEW UNIFIED DASHBOARD -->
    <div id="dashboard">
        <!-- PFD (Primary Flight Display) -->


        <!-- ND (Navigation Display / Minimap) -->
        <div id="nd" class="screen">
            <canvas id="minimap" width="300" height="300"></canvas>
        </div>

        <!-- EICAS (Telemetry) -->
        <div id="eicas" class="screen">
            <div class="instrument-row"><span>THRUST</span><span class="instrument-value" id="hud-thrust">0%</span>
            </div>
            <div class="instrument-row"><span>AOA</span><span class="instrument-value" id="hud-aoa">0.0°</span></div>
            <div class="instrument-row"><span>G-FORCE</span><span class="instrument-value" id="hud-gforce">1.0</span>
            </div>
            <div class="instrument-row"><span>GEAR</span><span class="instrument-value hud-gear-down"
                    id="hud-gear">DOWN</span></div>
            <div class="instrument-row"><span>FLAPS</span><span class="instrument-value" id="hud-flaps">0%</span></div>
            <div class="instrument-row"><span>SPOILERS</span><span class="instrument-value"
                    id="hud-spoilers">RETRACTED</span></div>
            <div class="instrument-row"><span>BRAKES</span><span class="instrument-value" id="hud-brakes">OFF</span>
            </div>
            <div class="instrument-row"><span>VS (FPM)</span><span class="instrument-value" id="hud-vs">0</span></div>
        </div>

        <!-- Controls Help -->

    </div>

    <script type="module" src="./js/modules/sim.js"></script>
</body>

</html>
