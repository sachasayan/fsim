<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyper-Realistic Airline Simulator</title>
    <link rel="icon" type="image/x-icon" href="./assets/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="435x435" href="./assets/icons/appicon.png">
    <link rel="apple-touch-icon" href="./assets/icons/appicon.png">
    <link rel="stylesheet" href="./styles/app.css">
    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "/node_modules/three/build/three.module.js",
                "three/addons/": "/node_modules/three/examples/jsm/",
                "@dimforge/rapier3d-compat": "/node_modules/@dimforge/rapier3d-compat/rapier.mjs",
                "lil-gui": "/node_modules/lil-gui/dist/lil-gui.esm.js"
            }
        }
    </script>
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
        <h2 id="loader-text">INITIALIZING FLIGHT DYNAMICS</h2>
        <p id="loader-subtext">Generating Procedural World...</p>
        <div id="loader-progress" aria-live="polite">
            <div class="loader-progress-row">
                <div class="loader-progress-labels">
                    <span>Terrain</span>
                    <span id="loader-terrain-progress-text">Waiting...</span>
                </div>
                <div class="loader-progress-track"><div id="loader-terrain-progress-bar" class="loader-progress-fill"></div></div>
            </div>
            <div class="loader-progress-row">
                <div class="loader-progress-labels">
                    <span>Assets</span>
                    <span id="loader-assets-progress-text">Waiting...</span>
                </div>
                <div class="loader-progress-track"><div id="loader-assets-progress-bar" class="loader-progress-fill"></div></div>
            </div>
        </div>
        <div id="terrain-bootstrap-debug"></div>
    </div>

    <div id="game-container"></div>
    <div id="warning-overlay">STALL</div>

    <!-- NEW CRASH SCREEN OVERLAY -->
    <div id="crash-screen">
        <h1 class="crash-title">AIRCRAFT DESTROYED
        </h1>
        <p id="crash-reason" class="crash-reason"></p>
        <button onclick="resetFlight()" class="crash-reset-btn">RESTART
            FLIGHT</button>
    </div>

    <!-- NEW UNIFIED DASHBOARD -->
    <div id="dashboard">
        <div id="token-counter" aria-live="polite">
            <span class="token-counter-burst" aria-hidden="true"></span>
            <span class="token-counter-label">TOKENS</span>
            <span class="token-counter-value" id="token-count">00</span>
        </div>
        <!-- PFD (Primary Flight Display) -->


        <!-- ND (Navigation Display / Minimap) -->
        <div id="nd" class="screen">
            <canvas id="minimap" width="300" height="300"></canvas>
        </div>

        <!-- EICAS (Telemetry) -->
        <div id="eicas" class="screen">
            <div class="instrument-row"><span>THRUST</span><span class="instrument-value" id="hud-thrust">0%</span>
            </div>
            <div class="instrument-row"><span>AOA</span><span class="instrument-value" id="hud-aoa">0.0°</span></div>
            <div class="instrument-row"><span>G-FORCE</span><span class="instrument-value" id="hud-gforce">1.0</span>
            </div>
            <div class="instrument-row"><span>GEAR</span><span class="instrument-value hud-gear-down"
                    id="hud-gear">DOWN</span></div>
            <div class="instrument-row"><span>FLAPS</span><span class="instrument-value" id="hud-flaps">0%</span></div>
            <div class="instrument-row"><span>SPOILERS</span><span class="instrument-value"
                    id="hud-spoilers">RETRACTED</span></div>
            <div class="instrument-row"><span>BRAKES</span><span class="instrument-value" id="hud-brakes">OFF</span>
            </div>
            <div class="instrument-row"><span>VS (FPM)</span><span class="instrument-value" id="hud-vs">0</span></div>
        </div>

        <!-- Controls Help -->

    </div>

    <script type="module" src="./js/modules/sim.js"></script>
</body>

</html>
